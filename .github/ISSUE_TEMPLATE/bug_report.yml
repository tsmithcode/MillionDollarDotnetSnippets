name: Bug report
description: Report a shipped behavior that is broken or misleading.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What broke?
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: How do we reproduce it?
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Why does this matter for the target persona?
    validations:
      required: true
